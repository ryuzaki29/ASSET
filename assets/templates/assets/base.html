<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Assets{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f7f7f7;
            color: #222;
        }

        nav {
            background: #222;
            padding: 12px 24px;
        }

        nav a {
            color: white;
            margin-right: 16px;
            text-decoration: none;
        }

        nav form {
            display: inline;
        }

        nav button {
            background: none;
            border: none;
            color: white;
            margin-right: 16px;
            text-decoration: none;
            font-size: inherit;
            font-family: inherit;
            cursor: pointer;
            padding: 0;
        }

        main {
            max-width: 800px;
            margin: 24px auto;
            padding: 24px 16px;
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <nav>
        <a href="{% url 'landing' %}">RAYMART</a>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'assets:asset_list' %}">Assets</a>
        <a href="{% url 'assets:user_list' %}">Users</a>
        {% if user.is_authenticated %}
            {% if user.is_staff %}
                <a href="{% url 'admin:index' %}">Admin</a>
            {% endif %}
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
