{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/ico" href="{% static 'images/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title %}Assets{% endblock %}</title>
    <style>
        nav {
            background: #8a1538;
            padding: 12px 24px;
        }

        nav a {
            color: white;
            margin-right: 16px;
            text-decoration: none;
        }

        nav a:hover {
            color: #ffcc33;
        }

        nav form {
            display: inline;
        }

        nav button {
            background: none;
            border: none;
            color: white;
            margin-right: 16px;
            text-decoration: none;
            font-size: inherit;
            font-family: inherit;
            cursor: pointer;
            padding: 0;
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg px-4 py-3" style="background:#8a1538;">
        <div class="container-fluid p-0 d-flex justify-content-between align-items-center">
    
            <!-- Left section contains the logo and menu navigation content -->
            <div class="d-flex align-items-center gap-4">
    
                <a class="navbar-brand m-0" href="{% url 'landing' %}">
                    <img 
                        src="{% static 'images/raymart_logo_nav.webp' %}" 
                        alt="Logo"
                        style="width:50px;"
                    >
                </a>
    
                <div class="d-flex align-items-center gap-3">
                    <a class="" href="{% url 'home' %}">
                        Home
                    </a>
    
                    <a class="" href="{% url 'assets:asset_list' %}">
                        Assets
                    </a>
    
                    <a class="" href="{% url 'assets:user_list' %}">
                        Users
                    </a>
    
                    {% if user.is_authenticated and user.is_staff %}
                        <a class="" href="{% url 'admin:index' %}">
                            Admin
                        </a>
                    {% endif %}
                </div>
            </div>
    
            <!-- Right Section for Login/Logout -->
            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <form method="post" action="{% url 'logout' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-nav btn-sm py-2">
                            Logout <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </form>
                {% else %}
                    <a class="btn btn-nav btn-sm py-2" href="{% url 'login' %}">
                        Login <i class="bi bi-box-arrow-in-right"></i>
                    </a>
                {% endif %}
            </div>
    
        </div>
    </nav>

    <main class="container my-4 py-4 px-3">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
