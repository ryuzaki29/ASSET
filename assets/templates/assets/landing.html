<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Management</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 48px 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        p {
            color: #555;
            margin-bottom: 32px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn:hover {
            background: #444;
        }

        .btn-outline {
            background: white;
            color: #222;
            border: 1px solid #222;
        }

        .btn-outline:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>RAYMART</h1>
        <p>Track, manage, and monitor your organization's assets in one place.</p>
        <div class="btn-group">
            <a href="{% url 'home' %}" class="btn btn-outline">Home</a>
            <a href="{% url 'login' %}" class="btn">Login</a>
        </div>
    </div>
</body>
</html>
