{% extends "assets/base.html" %}

{% block title %}Create Asset{% endblock %}

{% block extra_style %}
<style>
    * {
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(to bottom right, #fff7f9, #fff1f4);
        font-family: 'Segoe UI', sans-serif;
    }

    main {
        padding: 30px;
        min-height: 100vh;
    }

    /* CONTAINER */
    .form-container {
        max-width: 820px;
        margin: auto;
    }

    /* HEADER */
    .form-header {
        background: linear-gradient(135deg, #8a1538, #6d102c);
        color: white;
        padding: 32px;
        border-radius: 22px;
        margin-bottom: 26px;
        box-shadow: 0 10px 30px rgba(138, 21, 56, 0.25);
        position: relative;
        overflow: hidden;
    }

    .form-header::after {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 180px;
        height: 180px;
        background: rgba(255,255,255,0.08);
        border-radius: 50%;
    }

    .form-header h1 {
        margin: 0;
        font-size: 34px;
        font-weight: 700;
    }

    .form-header p {
        margin-top: 10px;
        opacity: 0.92;
        font-size: 15px;
        color: white;
    }

    /* FORM CARD */
    .form-card {
        background: white;
        border-radius: 22px;
        padding: 34px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        border: 1px solid #e8b8c5;
    }

    /* SECTION TITLE */
    .section-title {
        margin-bottom: 24px;
        font-size: 20px;
        font-weight: 700;
        color: #8a1538;
    }

    /* GRID */
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 24px;
    }

    .full-width {
        grid-column: 1 / -1;
    }

    /* FORM GROUP */
    .form-group {
        display: flex;
        flex-direction: column;
    }

    /* LABELS */
    label {
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 700;
        color: #8a1538;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* INPUTS */
    input[type="text"],
    input[type="number"],
    select,
    textarea {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #d9a5b5;
        border-radius: 14px;
        font-size: 15px;
        font-family: inherit;
        background: #fff8fa;
        color: #4a1021;
        transition: all 0.25s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
        outline: none;
        border-color: #8a1538;
        background: white;
        box-shadow: 0 0 0 4px rgba(138, 21, 56, 0.15);
    }

    textarea {
        resize: vertical;
        min-height: 120px;
        line-height: 1.6;
    }

    ::placeholder {
        color: #b07c8d;
    }

    /* BUTTONS */
    .button-group {
        display: flex;
        gap: 14px;
        margin-top: 34px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 14px 22px;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        transition: 0.25s ease;
        cursor: pointer;
    }

    .btn-primary {
        border: none;
        color: white;
        background: linear-gradient(to right, #8a1538, #6d102c);
        box-shadow: 0 6px 18px rgba(138, 21, 56, 0.18);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        opacity: 0.95;
    }

    .btn-secondary {
        width: 100%;
        background: white;
        border: 1px solid #d9a5b5;
        color: #8a1538;
    }

    .btn-secondary:hover {
        background: #fff1f4;
    }

    /* MOBILE */
    @media (max-width: 640px) {

        main {
            padding: 18px;
        }

        .form-header {
            padding: 24px;
        }

        .form-header h1 {
            font-size: 28px;
        }

        .form-card {
            padding: 24px;
        }

        .button-group {
            flex-direction: column;
        }

        .btn {
            width: 100%;
            text-align: center;
        }
    }
</style>
{% endblock %}

{% block content %}

<div class="form-container">

    <!-- HEADER -->
    <div class="form-header">
        <h1>Create New Asset</h1>

        <p>
            Register and manage institutional or IT assets within the inventory system.
        </p>
    </div>

    <!-- FORM -->
    <div class="form-card">

        <div class="section-title">
            Asset Information
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-grid">

                <!-- ASSET NAME -->
                <div class="form-group">
                    <label for="name">Asset Name</label>

                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Enter asset name"
                        required
                    >
                </div>

                <!-- ASSET TYPE -->
                <div class="form-group">
                    <label for="asset_type">Asset Type</label>

                    <select id="asset_type" name="asset_type" required>
                        <option value="">Select Asset Type</option>

                        {% for value, label in type_choices %}
                            <option value="{{ value }}">
                                {{ label }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- CATEGORY -->
                <div class="form-group">
                    <label for="category">Category</label>

                    <input
                        type="text"
                        id="category"
                        name="category"
                        placeholder="e.g. Networking, Hardware, Office Equipment"
                        required
                    >
                </div>

                <!-- COST -->
                <div class="form-group">
                    <label for="cost">Cost</label>

                    <input
                        type="number"
                        id="cost"
                        name="cost"
                        step="0.01"
                        placeholder="0.00"
                        required
                    >
                </div>

                <!-- QUANTITY -->
                <div class="form-group">
                    <label for="quantity">Quantity</label>

                    <input
                        type="number"
                        id="quantity"
                        name="quantity"
                        placeholder="Enter quantity"
                        required
                    >
                </div>

                <!-- STATUS -->
                <div class="form-group">
                    <label for="status">Status</label>

                    <select id="status" name="status" required>
                        <option value="">Select Status</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                        <option value="Maintenance">Maintenance</option>
                    </select>
                </div>

                <!-- LOG DETAILS -->
                <div class="form-group full-width">
                    <label for="log_details">
                        Log Details / Notes
                    </label>

                    <textarea
                        id="log_details"
                        name="log_details"
                        placeholder="Enter remarks, deployment notes, maintenance history, or additional details..."
                    ></textarea>
                </div>

            </div>

            <!-- BUTTONS -->
            <div class="button-group">

                <button type="submit" class="btn btn-primary">
                    + Add Asset
                </button>

                <a href="{% url 'assets:asset_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
