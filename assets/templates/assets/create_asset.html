{% extends "assets/base.html" %}

{% block title %}Create Asset{% endblock %}

{% block extra_style %}
<style>
    main {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    h1 {
        margin-bottom: 30px;
    }

    .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
    }

    label {
        margin-bottom: 8px;
        font-weight: 600;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        font-family: inherit;
    }

    textarea {
        resize: vertical;
        min-height: 80px;
    }

    .button-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }

    button {
        padding: 10px 20px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        color: #333;
        cursor: pointer;
    }

    button[type="submit"] {
        background: #f0f0f0;
    }

    .cancel-btn {
        background: #f0f0f0;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 4px;
        border: 1px solid #ccc;
        color: #333;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
</style>
{% endblock %}

{% block content %}
    <h1>Create New Asset</h1>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="name">Asset Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="asset_type">Asset Type</label>
            <select id="asset_type" name="asset_type" required>
                <option value="">Select Type</option>
                {% for value, label in type_choices %}
                    <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" required>
        </div>
        
        <div class="form-group">
            <label for="cost">Cost</label>
            <input type="number" id="cost" name="cost" step="0.01" required>
        </div>
        
        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" required>
        </div>
        
        <div class="form-group">
            <label for="status">Status</label>
            <input type="text" id="status" name="status" required>
        </div>
        
        <div class="form-group">
            <label for="log_details">Log Details (Optional)</label>
            <textarea id="log_details" name="log_details"></textarea>
        </div>
        
        <div class="button-group">
            <button type="submit">Add Asset</button>
            <a href="{% url 'assets:asset_list' %}" class="cancel-btn">Cancel</a>
        </div>
    </form>
{% endblock %}
