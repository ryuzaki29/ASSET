<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Asset Management</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        input:focus {
            outline: none;
            border-color: #222;
        }

        .errors {
            background: #fff0f0;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 10px 14px;
            margin-bottom: 16px;
            color: #721c24;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #222;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #444;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #222;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Asset Management</h1>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="errors">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <label for="id_username">Username</label>
            {{ form.username }}

            <label for="id_password">Password</label>
            {{ form.password }}

            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit">Log in</button>
        </form>

        <a href="{% url 'landing' %}" class="back-link">&larr; Back to Home</a>
    </div>
</body>
</html>
