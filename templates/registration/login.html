{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/ico" href="{% static 'images/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Real-time Asset Yield Management Audit Reporting Tool | Login</title>

    <style>

    </style>
</head>
<body class="login-body landing-bg-overlay">
    <div class="card">
        <img src="{% static 'images/raymart_logotype.webp' %}" style="max-width:320px;" class="mb-4">

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="errors">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <label for="id_username">Username</label>
            {{ form.username }}

            <label for="id_password">Password</label>
            {{ form.password }}

            <input type="hidden" name="next" value="{{ next }}">
            <button class="mt-3 mb-2 btn-primary" type="submit">Log in</button>
        </form>

        <p class="mt-2 text-center"><a href="#" class="registration-link">Register</a> | <a href="#" class="pwreset-link">Forgot Password</a></p>
        <a href="{% url 'landing' %}" class="back-link">&larr; Back to Home</a>
    </div>
</body>
</html>
